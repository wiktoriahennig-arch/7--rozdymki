    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const jumpInput = document.getElementById('jump-input');

    function loadQuestion() {
        const currentData = allQuizData[currentQuiz];
        questionText.innerText = currentData.q;
        optionsContainer.innerHTML = '';

        // Render opcji
        currentData.o.forEach((option, index) => {
            const div = document.createElement('div');
            div.classList.add('option');
            div.innerText = option;
            
            // Od razu podświetla poprawną odpowiedź
            if (index === currentData.c) {
                div.classList.add('correct');
            }
            
            optionsContainer.appendChild(div);
        });

        // Kontrolki
        btnPrev.disabled = currentQuiz === 0;
        btnNext.disabled = currentQuiz === allQuizData.length - 1;
        jumpInput.value = currentQuiz + 1;

        updateProgress();
    }

    function updateProgress() {
        progressText.innerText = `Pytanie ${currentQuiz + 1} / ${allQuizData.length}`;
        const percent = ((currentQuiz + 1) / allQuizData.length) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function nextQuestion() {
        if (currentQuiz < allQuizData.length - 1) {
            currentQuiz++;
            loadQuestion();
        }
    }

    function prevQuestion() {
        if (currentQuiz > 0) {
            currentQuiz--;
            loadQuestion();
        }
    }

    function jumpToQuestion() {
        let val = parseInt(jumpInput.value);
        if (val >= 1 && val <= allQuizData.length) {
            currentQuiz = val - 1;
            loadQuestion();
        } else {
            alert(`Wpisz liczbę od 1 do ${allQuizData.length}`);
        }
    }

    // Start
    loadQuestion();
</script>

</body>
</html>
