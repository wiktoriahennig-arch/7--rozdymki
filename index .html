        { q: "54. Objawem przełomu miastenicznego NIE jest:", o: ["A. Zwężenie źrenic", "B. Niepokój", "C. Tachykardia", "D. Rozszerzenie źrenic"], c: 0 },
        { q: "55. Podaż leków p/drgawkowych w stanie padaczkowym odbywa się:", o: ["A. Tylko drogą dożylną", "B. Tylko drogą doustną", "C. Tylko drogą domięśniową", "D. Drogą dożylną, domięśniową i doustną"], c: 0 },
        { q: "56. Dieta chorego na SM powinna uwzględniać:", o: ["A. Większą podaż węglowodanów prostych", "B. Zmniejszoną ilość płynów", "C. Zwiększoną podaż wielonienasyconych kwasów omega", "D. Wszystkie powyższe"], c: 2 },
        { q: "57. Postępowanie pielęgniarskie przy opadających powiekach u chorych na miastenię:", o: ["A. Okulary również w oświetlonych pomieszczeniach", "B. Naprzemienne zaklejanie oka, odpoczynek z zamkniętymi oczami", "C. Podklejanie opadających powiek", "D. Wszystkie odpowiedzi prawidłowe"], c: 3 },
        { q: "58. Dieta chorego na miastenię powinna zawierać:", o: ["A. Zwiększoną podaż sodu", "B. Zwiększoną podaż białka", "C. Zwiększoną podaż potasu", "D. Zwiększoną podaż węglowodanów"], c: 2 },
        { q: "59. Prawidłowa pozycja w ostrym udarze niedokrwiennym:", o: ["A. Pozycja Trendelenburga", "B. Pozycja półsiedząca", "C. Pozycja grzbietowa z głową uniesioną o około 20 stopni", "D. Pozycja z opuszczonymi nogami"], c: 2 }
    ];

    // Zmienne przypisujące każdemu pytaniu jego oryginalne ID, aby ulubione działały sprawnie po wymieszaniu
    let activeData = allQuizData.map((item, index) => ({ ...item, originalId: index }));
    let favorites = JSON.parse(localStorage.getItem('neurologiaFavs')) || [];
    let currentQuiz = 0;
    let scoreGood = 0;
    let scoreBad = 0;
    let answeredQuestions = new Set();
    let isFavMode = false;

    // Elementy DOM
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const totalQuestionsInfo = document.getElementById('total-questions-info');
    const progressText = document.getElementById('progress-text');
    const scoreText = document.getElementById('score-text');
    const progressFill = document.getElementById('progress-fill');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const jumpInput = document.getElementById('jump-input');
    const btnFav = document.getElementById('btn-fav');
    const modeBtn = document.getElementById('mode-btn');

    function initQuiz() {
        totalQuestionsInfo.innerText = `${activeData.length} pytań`;
        loadQuestion();
    }

    function loadQuestion() {
        if(activeData.length === 0) {
            questionText.innerText = "Brak pytań w tej sekcji!";
            optionsContainer.innerHTML = '';
            updateStats();
            return;
        }

        const currentData = activeData[currentQuiz];
        questionText.innerText = currentData.q;
        optionsContainer.innerHTML = '';

        // Ulubione
        if (favorites.includes(currentData.originalId)) {
            btnFav.classList.add('active');
            btnFav.innerText = "★ Usuń z ulubionych";
        } else {
            btnFav.classList.remove('active');
            btnFav.innerText = "☆ Dodaj do ulubionych";
        }

        // Render opcji
        currentData.o.forEach((option, index) => {
            const div = document.createElement('div');
            div.classList.add('option');
            div.innerText = option;
            
            // Sprawdź czy już odpowiedziano na to pytanie
            if (answeredQuestions.has(currentData.originalId)) {
                if (index === currentData.c) {
                    div.classList.add('correct');
                } else if (currentData.userAnswer === index) {
                    div.classList.add('wrong');
                }
            } else {
                div.onclick = () => selectAnswer(index, div);
            }
            
            optionsContainer.appendChild(div);
        });

        // Kontrolki
        btnPrev.disabled = currentQuiz === 0;
        btnNext.disabled = currentQuiz === activeData.length - 1;
        jumpInput.value = currentQuiz + 1;

        updateProgress();
    }

    function selectAnswer(selectedIndex, divEl) {
        const currentData = activeData[currentQuiz];
        if (answeredQuestions.has(currentData.originalId)) return;

        answeredQuestions.add(currentData.originalId);
        currentData.userAnswer = selectedIndex;

        const allOptions = optionsContainer.children;
        allOptions[currentData.c].classList.add('correct'); // Pokaż dobrą

        if (selectedIndex === currentData.c) {
            scoreGood++;
        } else {
            divEl.classList.add('wrong'); // Pokaż błąd
            scoreBad++;
        }

        updateStats();
    }

    function updateProgress() {
        if(activeData.length === 0) return;
        progressText.innerText = `Pytanie ${currentQuiz + 1} / ${activeData.length}`;
        const percent = ((currentQuiz + 1) / activeData.length) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function updateStats() {
        scoreText.innerText = `Wynik: ${scoreGood} dobrych, ${scoreBad} złych`;
        document.getElementById('stat-good').innerText = scoreGood;
        document.getElementById('stat-bad').innerText = scoreBad;
        
        let totalAnswered = scoreGood + scoreBad;
        let perc = totalAnswered === 0 ? 0 : Math.round((scoreGood / totalAnswered) * 100);
        document.getElementById('stat-perc').innerText = `${perc}%`;
    }

    function nextQuestion() {
        if (currentQuiz < activeData.length - 1) {
            currentQuiz++;
            loadQuestion();
        }
    }

    function prevQuestion() {
        if (currentQuiz > 0) {
            currentQuiz--;
            loadQuestion();
        }
    }

    function jumpToQuestion() {
        let val = parseInt(jumpInput.value);
        if (val >= 1 && val <= activeData.length) {
            currentQuiz = val - 1;
            loadQuestion();
        } else {
            alert(`Wpisz liczbę od 1 do ${activeData.length}`);
        }
    }

    function shuffleQuestions() {
        // Mieszanie algorytmem Fishera-Yatesa
        for (let i = activeData.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [activeData[i], activeData[j]] = [activeData[j], activeData[i]];
        }
        currentQuiz = 0;
        loadQuestion();
    }

    function restartQuiz() {
        scoreGood = 0;
        scoreBad = 0;
        currentQuiz = 0;
        answeredQuestions.clear();
        activeData.forEach(q => q.userAnswer = null);
        updateStats();
        loadQuestion();
    }

    function toggleFavorite() {
        if(activeData.length === 0) return;
        const currentData = activeData[currentQuiz];
        const id = currentData.originalId;

        if (favorites.includes(id)) {
            favorites = favorites.filter(favId => favId !== id);
        } else {
            favorites.push(id);
        }
        
        localStorage.setItem('neurologiaFavs', JSON.stringify(favorites));
        loadQuestion();
    }

    function toggleMode() {
        isFavMode = !isFavMode;
        if (isFavMode) {
            modeBtn.innerText = "Wszystkie pytania";
            modeBtn.classList.remove('btn-secondary');
            modeBtn.classList.add('btn-primary');
            
            // Filtruj tylko ulubione
            activeData = allQuizData
                .map((item, index) => ({ ...item, originalId: index }))
                .filter(item => favorites.includes(item.originalId));
                
        } else {
            modeBtn.innerText = "Ucz się ulubionych";
            modeBtn.classList.remove('btn-primary');
            modeBtn.classList.add('btn-secondary');
            
            // Wróć do wszystkich
            activeData = allQuizData.map((item, index) => ({ ...item, originalId: index }));
        }
        
        restartQuiz();
    }

    // Start
    initQuiz();
</script>
